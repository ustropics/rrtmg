<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRTMG Radiative Transfer Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
    --bg-primary: #0a0e17;
    --bg-card: #111827;
    --bg-card-hover: #1a2332;
    --bg-sidebar: #0d1220;
    --text-primary: #ffffff;
    --text-secondary: #c8d0de;
    --text-muted: #8b95a8;
    --accent-lw: #f59e42;
    --accent-sw: #38bdf8;
    --accent-heat: #c084fc;
    --accent-spectral: #34d399;
    --border: #1e293b;
    --border-active: #334155;
    --glow-lw: rgba(245, 158, 66, 0.15);
    --glow-sw: rgba(56, 189, 248, 0.15);
    --glow-heat: rgba(192, 132, 252, 0.15);
    --glow-spectral: rgba(52, 211, 153, 0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
}

/* ===== HEADER ===== */
.header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: rgba(10, 14, 23, 0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    letter-spacing: 0.02em;
    background: linear-gradient(135deg, var(--accent-lw), var(--accent-sw));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.header .subtitle {
    font-size: 0.85rem;
    color: var(--text-secondary);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
}

/* ===== LAYOUT ===== */
.layout {
    display: flex;
    margin-top: 64px;
    min-height: calc(100vh - 64px);
}

/* ===== SIDEBAR ===== */
.sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    padding: 1.5rem 0;
    position: fixed;
    top: 64px;
    bottom: 0;
    overflow-y: auto;
    z-index: 50;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.nav-section {
    margin-bottom: 1.5rem;
}

.nav-section-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-secondary);
    padding: 0.5rem 1.5rem;
}

.nav-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.55rem 1.5rem;
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: 0.9rem;
    color: var(--text-secondary);
    border-left: 3px solid transparent;
}

.nav-item:hover {
    background: rgba(255,255,255,0.03);
    color: var(--text-primary);
}

.nav-item.active {
    color: var(--text-primary);
    background: rgba(255,255,255,0.05);
    font-weight: 500;
}

.nav-item.active[data-category="control"] { border-left-color: var(--accent-lw); }
.nav-item.active[data-category="flux"] { border-left-color: var(--accent-sw); }
.nav-item.active[data-category="heat"] { border-left-color: var(--accent-heat); }
.nav-item.active[data-category="spectral"] { border-left-color: var(--accent-spectral); }

.nav-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
}

.nav-dot.lw { background: var(--accent-lw); }
.nav-dot.sw { background: var(--accent-sw); }
.nav-dot.heat { background: var(--accent-heat); }
.nav-dot.spectral { background: var(--accent-spectral); }

/* ===== MAIN CONTENT ===== */
.main {
    margin-left: 280px;
    flex: 1;
    padding: 2rem 2.5rem;
}

/* ===== SECTION ===== */
.section {
    display: none;
    animation: fadeIn 0.4s ease;
}

.section.active { display: block; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
}

.section-header {
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
}

.section-header h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    margin-bottom: 0.4rem;
}

.section-header p {
    color: var(--text-secondary);
    font-size: 1rem;
    line-height: 1.6;
    max-width: 700px;
}

.tag {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    padding: 0.2rem 0.5rem;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 0.4rem;
    margin-top: 0.5rem;
}

.tag.lw { background: var(--glow-lw); color: var(--accent-lw); }
.tag.sw { background: var(--glow-sw); color: var(--accent-sw); }

/* ===== FILTER TABS ===== */
.filter-bar {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
}

.filter-btn {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.875rem;
    padding: 0.4rem 1rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
}

.filter-btn:hover {
    border-color: var(--border-active);
    color: var(--text-primary);
}

.filter-btn.active {
    background: rgba(255,255,255,0.08);
    color: var(--text-primary);
    border-color: var(--text-muted);
}

/* ===== FIGURE GRID ===== */
.figure-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 1.5rem;
}

.figure-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: all 0.3s ease;
    cursor: pointer;
}

.figure-card:hover {
    border-color: var(--border-active);
    background: var(--bg-card-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}

.figure-card img {
    width: 100%;
    display: block;
    background: #fff;
    padding: 4px;
}

.figure-card .card-label {
    padding: 0.7rem 1rem;
    font-size: 0.9rem;
    color: var(--text-primary);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.figure-card .card-label .card-tags {
    display: flex;
    gap: 0.3rem;
}

.card-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    padding: 0.15rem 0.4rem;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
}

.card-tag.lw { background: var(--glow-lw); color: var(--accent-lw); }
.card-tag.sw { background: var(--glow-sw); color: var(--accent-sw); }
.card-tag.trop { background: rgba(34,197,94,0.12); color: #4ade80; }
.card-tag.usstd { background: rgba(168,85,247,0.12); color: #c084fc; }

/* ===== LIGHTBOX ===== */
.lightbox {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 200;
    background: rgba(0,0,0,0.88);
    backdrop-filter: blur(8px);
    align-items: center;
    justify-content: center;
    padding: 2rem;
    cursor: zoom-out;
}

.lightbox.active { display: flex; }

.lightbox img {
    max-width: 90%;
    max-height: 90vh;
    border-radius: 6px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    background: #fff;
}

.lightbox-close {
    position: absolute;
    top: 1.5rem;
    right: 1.5rem;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.5);
    color: white;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* ===== HAMBURGER BUTTON (hidden on desktop) ===== */
.hamburger {
    display: none;
    flex-direction: column;
    justify-content: center;
    gap: 5px;
    width: 36px;
    height: 36px;
    padding: 4px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    flex-shrink: 0;
}
.hamburger span {
    display: block;
    height: 2px;
    background: var(--text-primary);
    border-radius: 2px;
    transition: all 0.25s ease;
}
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* ===== SIDEBAR OVERLAY (mobile) ===== */
.sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 49;
    backdrop-filter: blur(2px);
}
.sidebar-overlay.active { display: block; }

/* ===== RESPONSIVE ===== */

/* Tablet: 600–1024px — sidebar still visible but narrower, 2-col grid */
@media (max-width: 1024px) and (min-width: 601px) {
    .sidebar {
        width: 240px;
        min-width: 240px;
    }
    .main {
        margin-left: 240px;
        padding: 1.5rem 2rem;
    }
    .figure-grid {
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    }
    .header h1 { font-size: 1.2rem; }
    .header .subtitle { font-size: 0.75rem; }
}

/* Mobile: ≤600px — hamburger drawer navigation */
@media (max-width: 600px) {
    .hamburger { display: flex; }
    .header {
        padding: 0 1rem;
        gap: 0.75rem;
        height: 56px;
    }
    .header > div:first-child { flex: 1; min-width: 0; }
    .header h1 {
        font-size: 1rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .header .subtitle { display: none; }

    .layout { margin-top: 56px; min-height: calc(100vh - 56px); }

    .sidebar {
        top: 56px;
        left: 0;
        width: 280px;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        z-index: 50;
        box-shadow: 4px 0 24px rgba(0,0,0,0.4);
    }
    .sidebar.mobile-open {
        transform: translateX(0);
    }

    .main {
        margin-left: 0;
        padding: 1.25rem 1rem;
    }

    .figure-grid { grid-template-columns: 1fr; }

    .section-header h2 { font-size: 1.4rem; }
    .section-header p { font-size: 0.9rem; }

    .filter-bar { gap: 0.4rem; }
    .filter-btn {
        font-size: 0.8rem;
        padding: 0.45rem 0.75rem;
    }

    .figure-card .card-label { font-size: 0.85rem; }
}
</style>
</head>
<body>

<div class="header">
    <button class="hamburger" id="hamburger" aria-label="Toggle navigation" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
    </button>
    <div>
        <h1>RRTMG Radiative Transfer Analysis</h1>
    </div>
    <div class="subtitle">Longwave &amp; Shortwave &middot; Tropical &amp; US Standard</div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main" id="main"></main>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
    <img id="lightbox-img" src="" alt="">
</div>

    { label: "CH₄ × 2.0", ids: ["ch4-double-flux","ch4-double-hr","ch4-double-spectral"] },
    { label: "No O₃", ids: ["no-o3-flux","no-o3-hr","no-o3-spectral"] },
];

// =========================================================================
//  BUILD UI
// =========================================================================
function buildSidebar() {
    const sb = document.getElementById('sidebar');
    let html = '';
    for (const group of navGroups) {
        html += `<div class="nav-section">`;
        html += `<div class="nav-section-title">${group.label}</div>`;
        for (const id of group.ids) {
            const sec = sections.find(s => s.id === id);
            if (!sec) continue;
            html += `<div class="nav-item" data-id="${sec.id}" data-category="${sec.category}" onclick="showSection('${sec.id}')">`;
            html += `<span class="nav-dot ${sec.dot}"></span>`;
            html += `<span>${sec.nav}</span>`;
            html += `</div>`;
        }
        html += `</div>`;
    }
    sb.innerHTML = html;
}

function buildMain() {
    const main = document.getElementById('main');
    let html = '';
    for (const sec of sections) {
        html += `<div class="section" id="section-${sec.id}">`;
        html += `<div class="section-header">`;
        html += `<h2>${sec.title}</h2>`;
        html += `<p>${sec.desc}</p>`;
        html += `</div>`;
        html += `<div class="filter-bar">`;
        html += `<button class="filter-btn active" onclick="filterFigures('${sec.id}','all',this)">All</button>`;
        html += `<button class="filter-btn" onclick="filterFigures('${sec.id}','lw',this)">Longwave</button>`;
        html += `<button class="filter-btn" onclick="filterFigures('${sec.id}','sw',this)">Shortwave</button>`;
        html += `<button class="filter-btn" onclick="filterFigures('${sec.id}','trop',this)">Tropical</button>`;
        html += `<button class="filter-btn" onclick="filterFigures('${sec.id}','usstd',this)">US Standard</button>`;
        html += `</div>`;
        html += `<div class="figure-grid" id="grid-${sec.id}">`;
        for (const fig of sec.figures) {
            const tagClasses = fig.tags.join(' ');
            html += `<div class="figure-card" data-tags="${fig.tags.join(',')}" onclick="openLightbox('${fig.src}')">`;
            html += `<img src="${fig.src}" alt="${fig.label}" loading="lazy">`;
            html += `<div class="card-label">`;
            html += `<span>${fig.label}</span>`;
            html += `<div class="card-tags">`;
            for (const t of fig.tags) {
                html += `<span class="card-tag ${t}">${t}</span>`;
            }
            html += `</div></div></div>`;
        }
        html += `</div></div>`;
    }
    main.innerHTML = html;
}

// =========================================================================
//  INTERACTIONS
// =========================================================================
function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const sec = document.getElementById('section-' + id);
    if (sec) sec.classList.add('active');
    const nav = document.querySelector(`.nav-item[data-id="${id}"]`);
    if (nav) nav.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    closeMobileSidebar();
}

function filterFigures(sectionId, tag, btn) {
    const grid = document.getElementById('grid-' + sectionId);
    const cards = grid.querySelectorAll('.figure-card');
    cards.forEach(card => {
        const tags = card.dataset.tags.split(',');
        if (tag === 'all' || tags.includes(tag)) {
            card.style.display = '';
        } else {
            card.style.display = 'none';
        }
    });
    const bar = btn.parentElement;
    bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function openLightbox(src) {
    const lb = document.getElementById('lightbox');
    const img = document.getElementById('lightbox-img');
    img.src = src;
    lb.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
});

// =========================================================================
//  MOBILE NAV
// =========================================================================
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const hamburger = document.getElementById('hamburger');
    sidebar.classList.toggle('mobile-open');
    overlay.classList.toggle('active');
    hamburger.classList.toggle('open');
}

function closeMobileSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const hamburger = document.getElementById('hamburger');
    sidebar.classList.remove('mobile-open');
    overlay.classList.remove('active');
    hamburger.classList.remove('open');
}


buildSidebar();
buildMain();
showSection('control-flux');
</script>
